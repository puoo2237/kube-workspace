apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: delivery
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: nginx:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
        env:
          - name: DB_USERNAME
            valueFrom: 
              secretKeyRef:
                name: mysecret
                key: DB_USER
          - name: DB_ADDRESS
            valueFrom: 
              secretKeyRef:
                name: mysecret
                key: DB_URL